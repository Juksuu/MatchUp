name: Create Release

# Trigger the workflow when a new tag is pushed (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*.*.*'  # Matches tags like v1.0.0, v2.1.3, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Build project
        run: ./scripts/create-build.sh

      - name: Create Release with Auto-Generated Notes
        uses: softprops/action-gh-release@v1  # Use the latest version
        with:
          generate_release_notes: true  # Enable GitHub's built-in note generator
          # Optional: Mark as draft (review before publishing)
          # draft: true
          # Optional: Mark as prerelease
          # prerelease: true
          files: |
            build/MatchUp+cssharp+metamod.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub Actions
